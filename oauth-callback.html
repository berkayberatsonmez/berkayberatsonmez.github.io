<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikTok OAuth — Pythia</title>
<style>
  body {
    margin: 0;
    background: #0e0a1f;
    color: #e8e6f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    background: #1a1530;
    border: 1px solid rgba(168,85,247,0.32);
    border-radius: 16px;
    padding: 32px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(168,85,247,0.15);
  }
  h1 { font-size: 22px; margin: 0 0 8px; color: #a855f7; }
  p { line-height: 1.55; color: #e8e6f0; }
  .muted { color: #9b97b3; font-size: 14px; }
  .code-box {
    background: #0e0a1f;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 16px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 14px;
    word-break: break-all;
    margin: 12px 0;
    color: #d4a843;
  }
  button {
    background: #a855f7;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  button:hover { background: #7c3aed; }
  .error {
    background: #3a1010;
    border: 1px solid #6e1d1d;
    border-radius: 8px;
    padding: 12px 16px;
    margin: 12px 0;
    color: #ffb4b4;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>TikTok OAuth</h1>
  <p class="muted">Pythia için yetkilendirme kodu — bu sayfayı kapatma, kodu kopyala.</p>

  <div id="result"></div>

  <p class="muted" style="margin-top: 24px; font-size: 13px;">
    Bu sayfa Pythia'nın TikTok otomasyon kurulumu içindir.
    Kod alındıktan sonra get_tokens.py scripti ile değiştirilecek.
  </p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const errorDesc = params.get('error_description');
  const result = document.getElementById('result');

  if (error) {
    result.innerHTML =
      '<div class="error"><strong>Hata:</strong> ' + error +
      (errorDesc ? '<br>' + decodeURIComponent(errorDesc) : '') + '</div>';
  } else if (code) {
    result.innerHTML =
      '<p>Kodun başarıyla alındı. Aşağıdan kopyala ve get_tokens.py scriptine yapıştır:</p>' +
      '<div class="code-box" id="code-text">' + code + '</div>' +
      '<button onclick="copyCode()">Kopyala</button> ' +
      '<span id="copy-status" style="margin-left:12px; color: #9b97b3; font-size: 13px;"></span>';
  } else {
    result.innerHTML =
      '<div class="error">URL\'de "code" parametresi yok. ' +
      'TikTok\'un yönlendirmesinin doğru gelip gelmediğini kontrol et.</div>';
  }

  function copyCode() {
    const text = document.getElementById('code-text').innerText;
    navigator.clipboard.writeText(text).then(() => {
      document.getElementById('copy-status').innerText = '✓ Kopyalandı';
      setTimeout(() => {
        document.getElementById('copy-status').innerText = '';
      }, 2000);
    });
  }
</script>
</body>
</html>
